version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: retail_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: ./backend
    container_name: retail_api
    ports:
      - "3333:3333"
    environment:
      - DATABASE_URL=postgresql://admin:admin123@db:5432/retail_db?schema=public
    depends_on:
      - db

  app:
    build: ./frontend
    container_name: retail_app
    ports:
      - "5173:5173"
    stdin_open: true # Necessário para o Vite não fechar o container
    tty: true
    depends_on:
      - api

volumes:
  postgres_data: